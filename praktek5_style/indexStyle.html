<!DOCTYPE html>
<html>
    <head>
        <title> styling </title>
    </head>
    <header>
        <h1> styling</h1>
    </header>
    <body>
        <main>
            <p style="color: blue;">contoh paragraph dengan warna hijau</p>
            <p style="color: blue; background-color: aquamarine;">sama aja tapi ada background </p>
            <p style="color: rgb(119, 119, 223);"> yg ini pakai RGB angka</p>
            <p style="font-size: medium;"> yg ini ukuran medium</p>
            <p style="font-size: large;"> yg ini ukuran large</p>
            <p style="font-size: x-small;"> yg ini ukuran x-small</p>
            <p style="font-size: 20px;"> yg ini dengan px</p>
            <p style="font-family: 'Times New Roman', Times, serif;"> yg ini dengan font times new roman</p>
            <p style="border: 2px dashed blue;"> ini dengan border dashed</p>
            <p style="border: 2px solid grey;"> ini dengan border solid</p>
            <p style="border-top: 2px; 
                border-style: dashed;
                border-left: 2px; border-color: rebeccapurple;
                border-right: 3px;"
                
                > metode style terpisah2 </p>
        </main>
    </body>
</html>
