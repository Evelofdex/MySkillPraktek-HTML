<!DOCTYPE html>
<html>
    <head>
        <title> Class dan id </title>
        <style>
            .class1 {
                color: green;
                background-color: rgb(55, 54, 56);
                font-family: 'Times New Roman', Times, serif;
                font-size: large;
            }
            .class2 {
                color: red;
                background-color: aquamarine;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
                font-size: medium;
            }
            .firstHalf{
                color: aqua;
                background-color: black;
            }
            .secondHalf{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: x-large;
            }
        </style>
    </head>
    <header>
        <h1> class dan id </h1>
    </header>
    <body>
        <main>
           <p class="class1"> ini menggunakan class pertama </p> 
           <p class="class2"> ini menggunakan class kedua </p>
           <p class="firstHalf secondHalf"> pake 2 class sekaligus </p>
        </main>
    </body>
</html>
